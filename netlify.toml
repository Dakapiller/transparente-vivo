# Netlify configuration for the Transparente Vivo Vite + React SPA

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Vite 8 requires Node >=20.19 / >=22.12; pin the current LTS for reproducible builds
  NODE_VERSION = "22"

# SPA history fallback — serve the app shell for any path
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Fingerprinted build assets never change — cache them forever
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Always revalidate the HTML entry so new deploys are picked up immediately
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
