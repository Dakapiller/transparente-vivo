<style>
@font-face{font-family:'Outfit';font-weight:100;font-style:normal;font-display:swap;src:url('fonts/Outfit-100.ttf') format('truetype')}
@font-face{font-family:'Outfit';font-weight:200;font-style:normal;font-display:swap;src:url('fonts/Outfit-200.ttf') format('truetype')}
@font-face{font-family:'Outfit';font-weight:300;font-style:normal;font-display:swap;src:url('fonts/Outfit-300.ttf') format('truetype')}
@font-face{font-family:'Outfit';font-weight:400;font-style:normal;font-display:swap;src:url('fonts/Outfit-400.ttf') format('truetype')}
@font-face{font-family:'Outfit';font-weight:500;font-style:normal;font-display:swap;src:url('fonts/Outfit-500.ttf') format('truetype')}
@font-face{font-family:'Outfit';font-weight:600;font-style:normal;font-display:swap;src:url('fonts/Outfit-600.ttf') format('truetype')}
@font-face{font-family:'Outfit';font-weight:700;font-style:normal;font-display:swap;src:url('fonts/Outfit-700.ttf') format('truetype')}
@font-face{font-family:'Outfit';font-weight:800;font-style:normal;font-display:swap;src:url('fonts/Outfit-800.ttf') format('truetype')}
@font-face{font-family:'Outfit';font-weight:900;font-style:normal;font-display:swap;src:url('fonts/Outfit-900.ttf') format('truetype')}

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;font-weight:400;background:#fff;color:#1a1a2e;-webkit-font-smoothing:antialiased}
:root{
  --cream:#fffdf8;
  --orange:#ff4b00;
  --orange-light:#f9a07a;
  --blue-dark:#1636c8;
  --blue-mid:#0190fd;
  --blue-light:#e4f2ff;
  --grey:#8a8fa8;
  --grey-dark:#5a5f7a;
  --white:#ffffff;
  --border:#d0dff0;
  --radius:12px;
  --nav-h:80px;
}

/* ── NAV ── */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav-h);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 40px}
.nav-logo img{height:48px;width:auto;display:block}
.nav-right{display:flex;align-items:center;gap:1.5rem}
.nav-lang-wrap{position:relative}
.nav-lang{display:flex;align-items:center;gap:4px;font-size:.95rem;font-weight:600;color:var(--blue-dark);cursor:pointer;background:none;border:none;font-family:'Outfit',sans-serif}
.lang-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--white);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:none;flex-direction:column;min-width:64px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:200}
.lang-dropdown.open{display:flex}
.lang-dropdown button{background:none;border:none;padding:.6rem 1rem;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:500;color:var(--blue-dark);cursor:pointer;text-align:left}
.lang-dropdown button:hover{background:var(--blue-light)}
.nav-hamburger{display:flex;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
.nav-hamburger span{display:block;width:26px;height:2.5px;background:var(--blue-dark);border-radius:2px}

/* ── MENU OVERLAY ── */
.menu-overlay{position:fixed;inset:0;z-index:200;background:var(--blue-light);display:none;flex-direction:column}
.menu-overlay.open{display:flex}
.menu-header{height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 40px;border-bottom:1px solid var(--border)}
.menu-close{background:none;border:none;cursor:pointer;color:var(--blue-dark)}
.menu-close svg{width:28px;height:28px;stroke:var(--blue-dark);stroke-width:2;fill:none}
.menu-body{flex:1;padding:3rem 40px;display:flex;flex-direction:column}
.menu-items{list-style:none;margin-bottom:3rem}
.menu-items li{border-bottom:2px dashed var(--blue-mid);padding:1.25rem 0}
.menu-items li:last-child{border-bottom:none}
.menu-items a{font-size:clamp(1.5rem,2.5vw,2.2rem);font-weight:700;color:var(--blue-dark);text-decoration:none;display:block}
.menu-items a:hover{color:var(--blue-mid)}
.menu-cta{display:inline-flex;align-items:center;gap:1rem;background:var(--orange);color:#fff;font-size:1rem;font-weight:700;padding:.9rem 2rem;border-radius:50px;text-decoration:none;cursor:pointer;font-family:'Outfit',sans-serif}

/* ── BUTTONS ── */
.btn-orange{display:inline-flex;align-items:center;gap:1rem;background:var(--orange);color:#fff;font-size:1rem;font-weight:700;padding:.9rem 2rem;border-radius:50px;text-decoration:none;border:none;cursor:pointer;font-family:'Outfit',sans-serif;transition:background .2s;white-space:nowrap}
.btn-orange:hover{background:#e04000}
.btn-wa{display:inline-flex;align-items:center;justify-content:space-between;gap:.75rem;background:none;color:var(--grey-dark);font-size:1rem;font-weight:500;padding:.85rem 1.5rem;border-radius:50px;text-decoration:none;border:2px solid var(--border);cursor:pointer;font-family:'Outfit',sans-serif;width:100%;max-width:320px}
.btn-wa:hover{border-color:var(--blue-mid)}

/* ── HERO ── */
.hero{display:grid;grid-template-columns:1fr 1fr;padding-top:var(--nav-h);background:#fff;min-height:calc(100vh - var(--nav-h) + var(--nav-h))}
.hero-text{display:flex;flex-direction:column;justify-content:center;padding:5rem 40px 5rem 40px}
.hero-title{font-size:clamp(2.8rem,4.5vw,5.5rem);line-height:1.0;margin-bottom:2rem;font-weight:700;letter-spacing:-.01em}
.hero-title .hl{color:var(--orange-light);font-weight:700}
.hero-title .hb{color:var(--orange);font-weight:700}
.hero-sub{font-size:1.05rem;color:#3a3a4a;line-height:1.75;margin-bottom:2.5rem;max-width:480px}
.hero-image{position:sticky;top:var(--nav-h);height:calc(100vh - var(--nav-h));overflow:hidden}
.hero-image img{width:100%;height:100%;object-fit:cover;object-position:center center;display:block}
.hero-img-mobile{display:none}

/* ── STATS ── */
.stats{background:var(--blue-light);padding:5rem 40px 4rem}
.stats-headline{font-size:clamp(1.8rem,3vw,3rem);font-weight:700;color:var(--blue-dark);margin-bottom:3.5rem;line-height:1.15;max-width:600px}
.stats-headline .sh-mid{color:var(--blue-mid)}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);border-left:2px solid rgba(22,54,200,.15)}
.stat-item{padding:1.5rem 2rem 1.5rem;border-right:2px solid rgba(22,54,200,.15)}
.stat-icon{margin-bottom:1rem}
.stat-icon svg{width:36px;height:36px;stroke:var(--blue-dark);stroke-width:1.5;fill:none}
.stat-num{font-size:clamp(1.8rem,2.5vw,2.5rem);font-weight:700;color:var(--blue-dark);line-height:1}
.stat-unit{font-size:clamp(1.8rem,2.5vw,2.5rem);font-weight:700;color:var(--blue-mid);line-height:1}
.stat-desc{font-size:.88rem;color:var(--grey-dark);margin-top:.6rem;line-height:1.5;font-weight:400}

/* ── TIMELINE ── */
.timeline{background:linear-gradient(180deg,var(--blue-light) 0%,#fff 60%);padding:5rem 40px 5rem}
.timeline-title{font-size:clamp(1.8rem,3vw,3rem);font-weight:400;color:var(--grey);line-height:1.15;margin-bottom:4rem}
.timeline-title strong{font-weight:700;color:var(--blue-dark)}
.tl-track{position:relative;display:flex;align-items:flex-start;gap:0}
.tl-line-wrap{position:absolute;top:8px;left:16px;right:16px;height:2px;z-index:0}
.tl-line-blue{position:absolute;top:0;left:0;width:80%;height:2px;background:var(--blue-dark)}
.tl-line-orange{position:absolute;top:0;right:0;width:20%;height:2px;background:var(--orange)}
.tl-items{display:flex;width:100%;position:relative;z-index:1}
.tl-item{flex:1;display:flex;flex-direction:column;align-items:flex-start}
.tl-dot{width:16px;height:16px;border-radius:50%;background:var(--blue-dark);flex-shrink:0;margin-bottom:1rem}
.tl-item.current .tl-dot{background:var(--orange)}
.tl-year{font-size:1rem;font-weight:700;color:var(--blue-dark);margin-bottom:.25rem}
.tl-item.current .tl-year{color:var(--orange)}
.tl-desc{font-size:.88rem;color:var(--grey-dark);line-height:1.5;font-weight:400;max-width:140px}

/* ── TESTIMONIALS ── */
.testimonials{background:#fff;padding:5rem 40px 3rem}
.testimonials-title{font-size:clamp(1.8rem,3vw,3rem);font-weight:700;color:var(--blue-dark);margin-bottom:3rem;line-height:1.1}
.testimonials-title .tm{color:var(--blue-mid)}
.test-wrap{position:relative}
.test-carousel{display:flex;gap:1.5rem;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:.5rem}
.test-carousel::-webkit-scrollbar{display:none}
.test-card{flex:0 0 280px;scroll-snap-align:start;border:2px solid var(--blue-light);border-radius:var(--radius);overflow:hidden;background:#fff}
.test-photo{width:100%;aspect-ratio:4/3;object-fit:cover;object-position:top center;background:var(--blue-light);display:block}
.test-photo-placeholder{width:100%;aspect-ratio:4/3;background:var(--blue-light);display:flex;align-items:center;justify-content:center}
.test-body{padding:1rem 1rem .75rem}
.test-quote{font-size:.95rem;color:var(--blue-mid);font-weight:600;line-height:1.5;margin-bottom:.75rem}
.test-name{font-size:1rem;font-weight:700;color:var(--blue-dark);margin-bottom:.3rem}
.test-meta{display:flex;justify-content:space-between;align-items:center}
.test-role{font-size:.7rem;color:var(--grey);text-transform:uppercase;letter-spacing:.08em;font-weight:500}
.test-since{font-size:.7rem;color:var(--grey);text-transform:uppercase;letter-spacing:.08em;font-weight:500}
/* Nav arrows overlaid on carousel sides */
.test-nav-prev,.test-nav-next{position:absolute;top:38%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;border:2px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--blue-dark);z-index:2;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.test-nav-prev{left:-22px}
.test-nav-next{right:-22px}
.test-nav-prev:hover,.test-nav-next:hover{background:var(--blue-dark);color:#fff;border-color:var(--blue-dark)}

/* ── CTA MID ── */
.cta-mid{padding:2.5rem 40px 3rem;display:flex;flex-direction:column;align-items:flex-start;gap:.75rem}
.cta-mid-label{font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--grey)}

/* ── ECOSYSTEM ── */
.ecosystem{background:var(--blue-light);padding:5rem 40px}
.ecosystem-inner{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center}
.eco-label{font-size:.88rem;color:var(--blue-dark);font-weight:700;text-transform:none;margin-bottom:.75rem}
.ecosystem-title{font-size:clamp(1.6rem,2.8vw,2.6rem);font-weight:400;color:var(--grey);line-height:1.2;margin-bottom:1.5rem}
.ecosystem-title strong{font-weight:700;color:var(--blue-dark)}
.ecosystem-sub{font-size:1rem;color:var(--blue-mid);line-height:1.7;border-left:4px solid var(--blue-mid);padding-left:1.25rem;font-weight:400}
.ecosystem-sub strong{font-weight:700}
.eco-diagram{position:relative;width:340px;height:340px;flex-shrink:0;margin:0 auto}
.eco-arcs{position:absolute;inset:0;width:100%;height:100%;z-index:0}
.eco-node{position:absolute;display:flex;flex-direction:column;align-items:center;gap:.5rem;z-index:1}
.eco-top{top:0;left:50%;transform:translateX(-50%)}
.eco-right{right:-10px;top:50%;transform:translateY(-50%)}
.eco-bottom{bottom:0;left:50%;transform:translateX(-50%)}
.eco-left{left:-10px;top:50%;transform:translateY(-50%)}
.eco-bubble{width:90px;height:90px;border-radius:50%;border:1.5px solid var(--blue-light);background:#fff;display:flex;align-items:center;justify-content:center}
.eco-bubble svg{width:40px;height:40px}
.eco-label-txt{font-size:.8rem;font-weight:700;color:var(--blue-mid);text-align:center;white-space:nowrap}

/* ── COMPARISON ── */
.comparison{background:#fff;padding:5rem 40px}
.comparison-label{font-size:.88rem;color:var(--grey-dark);font-weight:400;margin-bottom:.75rem}
.comparison-title{font-size:clamp(1.8rem,3vw,3rem);font-weight:700;color:var(--blue-mid);margin-bottom:3rem;line-height:1.1}
.comparison-title strong{color:var(--blue-dark)}
.comparison-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
/* Não demolir — azul, bordered */
.comp-col{border-radius:var(--radius);padding:2rem 2rem}
.comp-col.nao-demolir{background:#fff;border:2px solid var(--blue-mid)}
.comp-col.demolir-col{background:#f5f6f8;border:2px solid #dce0e8}
.comp-col-title{font-size:1.4rem;font-weight:700;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1.5px solid rgba(0,0,0,.08)}
.comp-col.nao-demolir .comp-col-title{color:var(--blue-dark);border-bottom-color:rgba(1,144,253,.2)}
.comp-col.demolir-col .comp-col-title{color:var(--grey);border-bottom-color:rgba(0,0,0,.08)}
.comp-item{display:flex;gap:.875rem;align-items:flex-start;padding:.65rem 0;border-bottom:1.5px dashed rgba(0,0,0,.07)}
.comp-item:last-child{border-bottom:none}
.comp-check{width:20px;height:20px;flex-shrink:0;margin-top:2px}
.comp-item-text{font-size:.9rem;line-height:1.5;font-weight:400}
.comp-col.nao-demolir .comp-item-text{color:var(--blue-mid)}
.comp-col.nao-demolir .comp-check{color:var(--blue-mid)}
.comp-col.demolir-col .comp-item-text{color:var(--grey-dark)}
.comp-col.demolir-col .comp-check{color:var(--grey)}

/* ── GALLERY ── */
.gallery{background:#fff;padding:0 40px 4rem}
.gallery-wrap{position:relative}
.gallery-grid{display:flex;gap:1rem;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.gallery-grid::-webkit-scrollbar{display:none}
.gallery-item{flex:0 0 calc(50% - .5rem);aspect-ratio:4/3;border-radius:10px;overflow:hidden;scroll-snap-align:start;background:var(--blue-light)}
.gallery-item img{width:100%;height:100%;object-fit:cover;display:block}
.gallery-nav-prev,.gallery-nav-next{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:#fff;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--blue-dark);z-index:2;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.gallery-nav-prev{left:-22px}
.gallery-nav-next{right:-22px}
.gallery-nav-prev:hover,.gallery-nav-next:hover{background:var(--orange);color:#fff;border-color:var(--orange)}

/* ── PETITION ── */
.petition{background:#fff;padding:5rem 40px}
.petition-inner{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:start}
.petition-title{font-size:clamp(2rem,3.5vw,3.5rem);font-weight:700;color:var(--blue-mid);line-height:1.05;margin-bottom:1.5rem}
.petition-title strong{color:var(--blue-dark)}
.petition-body{font-size:1rem;color:var(--grey-dark);line-height:1.75;margin-bottom:2.5rem}
.petition-btns{display:flex;flex-direction:column;gap:.875rem;max-width:340px}

/* ── FOOTER ── */
footer{background:var(--blue-light);padding:4rem 40px 0;position:relative;overflow:hidden}
.footer-line{height:3px;background:var(--blue-mid);width:180px;margin-bottom:3rem;border-radius:2px}
.footer-inner{display:grid;grid-template-columns:1.6fr 1fr;gap:3rem;margin-bottom:4rem;position:relative;z-index:1}
.footer-about p{font-size:.95rem;color:#3a3a4a;line-height:1.8}
.footer-contact-wrap{display:flex;flex-direction:column;gap:1.5rem}
.footer-col-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--grey);margin-bottom:.4rem}
.footer-contact-info p{font-size:.82rem;color:var(--blue-mid);font-weight:700;text-transform:uppercase;letter-spacing:.04em;line-height:1.6}
.footer-contact-info a{color:var(--blue-mid);text-decoration:none}
.footer-social{display:flex;flex-direction:column;gap:.5rem}
.footer-social a{display:flex;align-items:center;gap:.6rem;font-size:.75rem;color:var(--blue-mid);text-decoration:none;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.footer-social a:hover{color:var(--blue-dark)}
.footer-bottom{border-top:1px solid var(--border);padding:1.25rem 0;font-size:.78rem;color:var(--grey);position:relative;z-index:1;margin-top:1rem}
.footer-vivo{position:absolute;bottom:0;left:0;right:0;pointer-events:none;z-index:0;line-height:0}
.footer-vivo svg{width:100%;height:auto;display:block}

/* ── STICKY CTA (mobile only) ── */
.sticky-cta{display:none;position:fixed;bottom:0;left:0;right:0;z-index:50;padding:.75rem 1rem;background:rgba(255,255,255,.97);border-top:1px solid var(--border)}

/* ═══════════════════════════════
   RESPONSIVE — 960px
═══════════════════════════════ */
@media(max-width:960px){
  :root{--nav-h:64px}
  .nav{padding:0 20px}
  .nav-logo img{height:40px}
  .menu-header{padding:0 20px}
  .menu-body{padding:2rem 20px}

  /* hero */
  .hero{grid-template-columns:1fr;padding-top:var(--nav-h)}
  .hero-image{position:relative;top:0;height:70vw;max-height:500px;order:-1}
  .hero-img-desktop{display:none!important}
  .hero-img-mobile{display:block!important;width:100%;height:100%;object-fit:cover}
  .hero-text{padding:2rem 20px 2.5rem}
  .hero-title{font-size:clamp(2rem,7vw,3.2rem)}
  .hero-sub{font-size:1rem}

  /* stats */
  .stats{padding:3rem 20px}
  .stats-headline{font-size:clamp(1.5rem,5vw,2.2rem);margin-bottom:2.5rem}
  .stats-grid{grid-template-columns:1fr 1fr;border-left:none}
  .stat-item{padding:1.5rem 1rem;border-right:2px solid rgba(22,54,200,.12);border-bottom:2px solid rgba(22,54,200,.12)}
  .stat-item:nth-child(even){border-right:none}
  .stat-num,.stat-unit{font-size:2rem}

  /* timeline */
  .timeline{padding:3rem 20px}
  .timeline-title{font-size:clamp(1.5rem,5vw,2rem);margin-bottom:2.5rem}
  /* mobile: vertical timeline */
  .tl-track{flex-direction:column;gap:0}
  .tl-line-wrap{display:none}
  .tl-items{flex-direction:column;gap:0}
  .tl-item{flex-direction:row;align-items:flex-start;gap:1.25rem;padding-bottom:2rem;position:relative}
  .tl-item::before{content:'';position:absolute;left:7px;top:16px;bottom:0;width:2px;background:var(--blue-dark)}
  .tl-item.current::before{background:var(--orange)}
  .tl-item:last-child::before{display:none}
  .tl-dot{margin-bottom:0;flex-shrink:0;margin-top:0}
  .tl-content{display:flex;flex-direction:column}
  .tl-year{font-size:1.1rem}
  .tl-desc{max-width:none;font-size:.95rem}

  /* testimonials */
  .testimonials{padding:3rem 0 2.5rem 20px}
  .testimonials-title{padding-right:20px}
  .test-card{flex:0 0 75vw;max-width:300px}
  .test-nav-prev,.test-nav-next{display:none}

  /* cta-mid */
  .cta-mid{padding:1.5rem 20px 2rem}
  .cta-mid .btn-orange{width:100%;justify-content:space-between}

  /* ecosystem */
  .ecosystem{padding:3rem 20px}
  .ecosystem-inner{grid-template-columns:1fr;gap:2.5rem}
  .eco-diagram{width:280px;height:280px}
  .eco-bubble{width:72px;height:72px}
  .eco-bubble svg{width:32px;height:32px}

  /* comparison */
  .comparison{padding:3rem 20px}
  .comparison-grid{grid-template-columns:1fr;gap:1.25rem}

  /* gallery */
  .gallery{padding:0 20px 3rem}

  /* petition */
  .petition{padding:3rem 20px}
  .petition-inner{grid-template-columns:1fr;gap:2rem}
  .petition-btns{max-width:100%}

  /* footer */
  footer{padding:3rem 20px 0}
  .footer-inner{grid-template-columns:1fr;gap:2rem}

  .sticky-cta{display:block}
  footer{padding-bottom:4rem}
}

/* ═══════════════════════════════
   RESPONSIVE — 600px
═══════════════════════════════ */
@media(max-width:600px){
  .hero-image{height:80vw}

}

  currentLang=lang;
  document.documentElement.lang=lang;
  document.getElementById('lang-label').textContent=lang.toUpperCase();
  const t=T[lang]||T.pt;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n');
    if(t[k]!==undefined) el.innerHTML=t[k];

  renderTestTitle(t);
  renderEcoTitle(t);
  renderEcoSub(t);
  renderCompTitle(t);

}

  if(dd) dd.classList.toggle('open');
}
function selectLang(lang){
  applyLang(lang);
  const dd=document.getElementById('lang-dropdown');
  if(dd) dd.classList.remove('open');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.nav-lang-wrap')){
    const dd=document.getElementById('lang-dropdown');
    if(dd) dd.classList.remove('open');
  }
});
function openMenu(){document.getElementById('menu-overlay').classList.add('open');document.body.style.overflow='hidden';}
function closeMenu(){document.getElementById('menu-overlay').classList.remove('open');document.body.style.overflow='';}

document.addEventListener('DOMContentLoaded',()=>applyLang(detectLang()));
</script>
</body>
</html>
