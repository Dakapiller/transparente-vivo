<style>
@font-face { font-family:'Outfit'; font-weight:100; font-style:normal; font-display:swap; src:url('fonts/Outfit-100.ttf') format('truetype'); }
@font-face { font-family:'Outfit'; font-weight:200; font-style:normal; font-display:swap; src:url('fonts/Outfit-200.ttf') format('truetype'); }
@font-face { font-family:'Outfit'; font-weight:300; font-style:normal; font-display:swap; src:url('fonts/Outfit-300.ttf') format('truetype'); }
@font-face { font-family:'Outfit'; font-weight:400; font-style:normal; font-display:swap; src:url('fonts/Outfit-400.ttf') format('truetype'); }
@font-face { font-family:'Outfit'; font-weight:500; font-style:normal; font-display:swap; src:url('fonts/Outfit-500.ttf') format('truetype'); }
@font-face { font-family:'Outfit'; font-weight:600; font-style:normal; font-display:swap; src:url('fonts/Outfit-600.ttf') format('truetype'); }
@font-face { font-family:'Outfit'; font-weight:700; font-style:normal; font-display:swap; src:url('fonts/Outfit-700.ttf') format('truetype'); }
@font-face { font-family:'Outfit'; font-weight:800; font-style:normal; font-display:swap; src:url('fonts/Outfit-800.ttf') format('truetype'); }
@font-face { font-family:'Outfit'; font-weight:900; font-style:normal; font-display:swap; src:url('fonts/Outfit-900.ttf') format('truetype'); }
</style>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;font-weight:400;background:#fff;color:#1a1a2e;-webkit-font-smoothing:antialiased}
:root{
  --cream:#fffdf8;
  --orange:#ff4b00;
  --orange-light:#f9a07a;
  --blue-dark:#1636c8;
  --blue-mid:#0190fd;
  --blue-light:#e4f2ff;
  --grey:#8a8fa8;
  --grey-dark:#5a5f7a;
  --white:#ffffff;
  --border:#d0dff0;
  --radius:12px;
  --nav-h:68px;
}
h1,h2,h3{font-weight:700;line-height:1.1}
p{line-height:1.7}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav-h);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 5vw}
.nav-logo img{height:44px;width:auto;display:block}
.nav-right{display:flex;align-items:center;gap:1.5rem}
.nav-lang{display:flex;align-items:center;gap:4px;font-size:.9rem;font-weight:500;color:var(--blue-dark);cursor:pointer;background:none;border:none;font-family:'Outfit',sans-serif}
.nav-lang-wrap{position:relative}
.lang-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--white);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:none;flex-direction:column;min-width:64px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:200}
.lang-dropdown.open{display:flex}
.lang-dropdown button{background:none;border:none;padding:.6rem 1rem;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:500;color:var(--blue-dark);cursor:pointer;text-align:left}
.lang-dropdown button:hover{background:var(--blue-light)}
.nav-hamburger{display:flex;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
.nav-hamburger span{display:block;width:24px;height:2px;background:var(--blue-dark);border-radius:2px}

/* MENU */
.menu-overlay{position:fixed;inset:0;z-index:200;background:var(--blue-light);display:none;flex-direction:column}
.menu-overlay.open{display:flex}
.menu-header{height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 5vw;border-bottom:1px solid var(--border)}
.menu-close{background:none;border:none;cursor:pointer}
.menu-close svg{width:24px;height:24px;stroke:var(--blue-dark);stroke-width:2;fill:none}
.menu-body{flex:1;padding:3rem 5vw;display:flex;flex-direction:column}
.menu-items{list-style:none;margin-bottom:3rem}
.menu-items li{border-bottom:2px dashed var(--blue-mid);padding:1.2rem 0}
.menu-items li:last-child{border-bottom:none}
.menu-items a{font-size:clamp(1.4rem,3vw,2rem);font-weight:700;color:var(--blue-dark);text-decoration:none;display:block}
.menu-cta{display:inline-flex;align-items:center;gap:1rem;background:var(--orange);color:#fff;font-size:1rem;font-weight:600;padding:.9rem 2rem;border-radius:50px;text-decoration:none;cursor:pointer;font-family:'Outfit',sans-serif}

/* HERO — 2-column layout: left scrolls, right sticky photo */
.hero{display:grid;grid-template-columns:1fr 1fr;padding-top:var(--nav-h);background:var(--white);align-items:start}
.hero-left{display:flex;flex-direction:column}
.hero-intro{display:flex;flex-direction:column;justify-content:center;min-height:calc(100vh - var(--nav-h));padding:4rem 5vw}
.hero-title{font-size:clamp(2.5rem,4.5vw,5rem);line-height:1.05;margin-bottom:1.5rem;font-weight:700}
.hero-title .light{color:var(--orange-light);font-weight:700}
.hero-title .bold{color:var(--orange);font-weight:700}
.hero-sub{font-size:.95rem;color:var(--grey-dark);line-height:1.75;margin-bottom:2rem;max-width:520px}
.hero-image{position:sticky;top:var(--nav-h);height:calc(100vh - var(--nav-h));overflow:hidden;background:#111}
.hero-image img{width:100%;height:100%;object-fit:cover;object-position:center center;display:block}
.hero-img-mobile{display:none}

/* BUTTONS */
.btn-orange{display:inline-flex;align-items:center;gap:1rem;background:var(--orange);color:#fff;font-size:1rem;font-weight:600;padding:.9rem 2rem;border-radius:50px;text-decoration:none;border:none;cursor:pointer;font-family:'Outfit',sans-serif;transition:background .2s;white-space:nowrap}
.btn-orange:hover{background:#e04000}
.btn-wa{display:inline-flex;align-items:center;gap:.75rem;background:none;color:var(--blue-dark);font-size:1rem;font-weight:500;padding:.85rem 1.5rem;border-radius:50px;text-decoration:none;border:2px solid var(--blue-dark);cursor:pointer;font-family:'Outfit',sans-serif}
.hero-cta-btn{align-self:flex-start}

/* STATS — inside hero on desktop */
.stats{background:linear-gradient(to bottom,var(--blue-light) 80%,var(--white) 100%);padding:3rem 5vw 4rem}
.stats-headline{font-size:clamp(1.6rem,3.5vw,3rem);font-weight:700;color:var(--blue-mid);margin-bottom:2.5rem;line-height:1.15}
.stats-headline strong{color:var(--blue-dark)}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-left:2px solid var(--blue-dark)}
.stat-item{padding:1.5rem 2rem;border-right:2px solid var(--blue-dark)}
.stat-icon{margin-bottom:1rem}
.stat-icon svg{height:52px;width:auto;fill:none}
.stat-num{font-size:clamp(1.8rem,2.5vw,2.5rem);font-weight:700;color:var(--blue-dark);line-height:1}
.stat-unit{font-size:clamp(1.8rem,2.5vw,2.5rem);font-weight:700;color:var(--blue-mid);line-height:1.1;margin-bottom:.5rem}
.stat-desc{font-size:.82rem;color:var(--grey);line-height:1.4}
/* 4th stat hidden on desktop (shown on mobile) */
.stat-item:nth-child(4){display:block}

/* TIMELINE — inside hero on desktop */
.timeline{background:var(--white);padding:3rem 0 5rem;display:flex;justify-content:center}
.timeline-inner{width:75%}
.timeline-title{font-size:clamp(1.4rem,2.8vw,2.2rem);line-height:1.2;margin-bottom:2.5rem;font-weight:400}
.timeline-title .tl-light{color:#b0b5cc;font-weight:400}
.timeline-title .tl-mid{color:var(--grey);font-weight:400}
.timeline-title .tl-dark{color:var(--grey-dark);font-weight:700}

/* Mobile: vertical timeline */
.timeline-track{display:flex;flex-direction:column;padding-left:0}
.tl-item{display:flex;gap:1.25rem;position:relative}
.tl-item::before{content:'';position:absolute;left:6px;top:20px;bottom:-1.5rem;width:2px;background:var(--blue-dark)}
.tl-item:last-child::before{display:none}
.tl-dot{width:14px;height:14px;border-radius:50%;background:var(--blue-dark);flex-shrink:0;margin-top:3px;position:relative;z-index:1}
.tl-dot-orange{background:var(--orange)}
.tl-body{padding-bottom:1.5rem}
.tl-year{font-size:1rem;font-weight:700;color:var(--blue-dark)}
.tl-year-orange{color:var(--orange)}
.tl-desc{font-size:.85rem;color:var(--grey-dark);margin-top:.2rem;line-height:1.4}

/* Desktop: horizontal timeline */
@media(min-width:961px){
  .timeline-track{flex-direction:row;position:relative;gap:0}
  .timeline-track::before{content:'';position:absolute;top:6px;left:7px;right:calc(20% - 7px);height:3px;background:linear-gradient(to right,var(--blue-dark) 75%,var(--orange) 75%);z-index:0}
  .tl-item{flex:1;flex-direction:column;gap:0;position:relative}
  .tl-item::before{display:none}
  .tl-dot{margin-bottom:.75rem;position:relative;z-index:1}
  .tl-body{padding-bottom:0}
  .tl-year{font-size:1.1rem;margin-bottom:.3rem}
  .tl-desc{font-size:.82rem}
}

/* TESTIMONIALS */
.testimonials{background:var(--white);padding:4rem 5vw}
.testimonials-title{font-size:clamp(1.6rem,3vw,2.5rem);font-weight:700;color:var(--blue-dark);margin-bottom:5rem;line-height:1.15}
.testimonials-title .t-dark{color:var(--blue-dark);font-weight:700}
.testimonials-title .t-light{color:var(--blue-mid);font-weight:400}
.testimonials-title .t-mid{color:var(--blue-mid);font-weight:400}
.test-carousel-wrap{position:relative}
.test-carousel{display:flex;gap:1rem;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:.5rem}
.test-carousel::-webkit-scrollbar{display:none}
.test-card{flex:0 0 calc(75vw / 4.5);scroll-snap-align:start;border:1px solid #e6e6e6;border-radius:3px;overflow:hidden;background:#f5f7fa;box-shadow:0 1px 3px rgba(0,0,0,.14)}
.test-photo-frame{background:#e5f3ff;position:relative}
.test-frame-svg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none}
.test-photo{width:100%;aspect-ratio:151/200;object-fit:cover;object-position:top center;display:block}
.test-photo-placeholder{width:100%;aspect-ratio:151/200;background:#f5f7fa;display:block}
.test-body{padding:.85rem .75rem .75rem;display:flex;flex-direction:column;gap:.35rem}
.test-quote{font-size:.82rem;color:var(--blue-mid);font-weight:500;line-height:1.5;margin:0}
.test-name{font-size:.9rem;font-weight:700;color:var(--blue-dark);margin:0}
.test-meta{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;margin:0}
.test-role{font-size:.58rem;color:var(--grey-dark);text-transform:uppercase;letter-spacing:.05em;margin:0}
.test-role-sep{font-size:.58rem;color:var(--grey);margin:0}
.test-since{font-size:.58rem;color:var(--grey);text-transform:uppercase;letter-spacing:.05em;margin:0}
/* Carousel arrows — absolute overlay on left/right sides, hidden on mobile */
.test-arrow{position:absolute;top:30%;transform:translateY(-50%);z-index:10;width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:rgba(255,255,255,.92);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--blue-dark);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.test-arrow:hover{background:var(--blue-dark);color:#fff;border-color:var(--blue-dark)}
.test-arrow-prev{left:-18px}
.test-arrow-next{right:-18px}

/* CTA MID */
.cta-mid{padding:2.5rem 5vw;display:flex;flex-direction:column;align-items:flex-start;gap:.75rem}
.cta-mid-label{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--grey)}

/* ECOSYSTEM */
.ecosystem{background:linear-gradient(to bottom,var(--blue-light) 0%,var(--white) 18%);padding:5rem 5vw}
.ecosystem-inner{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:center}
.eco-label{font-size:.82rem;color:var(--blue-dark);font-weight:700;margin-bottom:.75rem;text-transform:uppercase;letter-spacing:.06em}
.ecosystem-title{font-size:clamp(1.4rem,2.5vw,2rem);font-weight:400;line-height:1.3;margin-bottom:1.25rem}
.ecosystem-title .eco-t1{color:#b0b5cc;font-weight:400}
.ecosystem-title .eco-t2{color:var(--grey-dark);font-weight:700}
.ecosystem-title .eco-t3{color:#b0b5cc;font-weight:400}
.ecosystem-sub{font-size:1.14rem;line-height:1.85;border-left:4px solid var(--blue-mid);padding-left:1rem}
.ecosystem-sub .eco-s1{display:block;color:var(--blue-mid);font-weight:400;margin-bottom:.5rem}
.ecosystem-sub .eco-s2{display:block;color:var(--blue-dark);font-weight:600;margin-bottom:.5rem}
.ecosystem-sub .eco-s3{display:block;color:var(--blue-dark);font-weight:600}
.eco-circle{width:85%;height:auto;display:block;margin:0 auto}
.eco-arcs{position:absolute;inset:0;width:100%;height:100%;z-index:0}
.eco-node{position:absolute;display:flex;flex-direction:column;align-items:center;gap:.5rem;z-index:1}
.eco-top{top:0;left:50%;transform:translateX(-50%)}
.eco-right{right:0;top:50%;transform:translateY(-50%)}
.eco-bottom{bottom:0;left:50%;transform:translateX(-50%);flex-direction:column-reverse}
.eco-left{left:0;top:50%;transform:translateY(-50%)}
.eco-bubble{width:100px;height:100px;border-radius:50%;border:1.5px solid #c8e8f8;background:#fff;display:flex;align-items:center;justify-content:center}
.eco-bubble svg{width:44px;height:44px}
.eco-label-txt{font-size:.82rem;font-weight:700;color:var(--blue-mid);text-align:center;white-space:nowrap}

/* COMPARISON */
.comparison{background:var(--white);padding:5rem 5vw}
.comparison-label{font-size:.82rem;color:var(--grey);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.75rem}
.comparison-title{font-size:clamp(1.6rem,3vw,2.8rem);font-weight:700;color:var(--blue-mid);margin-bottom:3rem;line-height:1.15}
.comparison-title strong{color:var(--blue-dark)}
.comparison-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.comp-col{border-radius:var(--radius);padding:2rem}
/* Não demolir (left) — white background with blue border */
.comp-col.naodemoliir{background:var(--white);border:2px solid var(--blue-dark)}
.comp-col.naodemoliir .comp-col-title{color:var(--blue-dark);border-bottom:2px solid var(--blue-dark)}
.comp-col.naodemoliir .comp-item-text{color:var(--blue-dark)}
.comp-col.naodemoliir .comp-check{color:var(--blue-dark)}
.comp-col.naodemoliir .comp-item{border-bottom:1.5px dashed rgba(22,54,200,.35)}
/* Demolir (right) — gray */
.comp-col.demolir{background:#f2f4f7}
.comp-col-title{font-size:1.75rem;font-weight:700;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:2px solid rgba(0,0,0,.08)}
.comp-col.demolir .comp-col-title{color:#8a8fa8}
.comp-item{display:flex;gap:.75rem;align-items:flex-start;padding:.65rem 0;border-bottom:1.5px dashed rgba(0,0,0,.08)}
.comp-item:last-child{border-bottom:none}
.comp-check{width:22px;height:22px;flex-shrink:0;margin-top:2px}
.comp-item-text{font-size:.88rem;line-height:1.5}
.comp-col.demolir .comp-item-text{color:#6b7080}
.comp-col.demolir .comp-check{color:#9aa0b0}

/* GALLERY */
.gallery{background:var(--white);padding:0 5vw 4rem}
.gallery-wrap{position:relative}
.gallery-grid{display:flex;gap:1rem;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.gallery-grid::-webkit-scrollbar{display:none}
.gallery-placeholder{flex:0 0 calc(50% - .5rem);aspect-ratio:4/3;border-radius:8px;background:var(--blue-light);display:block;scroll-snap-align:start}
.gallery-nav{position:absolute;right:0;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;background:var(--orange);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;z-index:2;margin-right:-8px}

/* PETITION */
.petition{background:var(--blue-light);padding:5rem 5vw 8rem}
.petition-title{font-size:clamp(1.8rem,3.5vw,3.5rem);font-weight:400;color:var(--orange-light);line-height:1.1;margin-bottom:1.25rem}
.petition-title strong{color:var(--orange);font-weight:700}
.petition-body{font-size:.95rem;color:var(--grey-dark);line-height:1.75;margin-bottom:2rem;max-width:560px}
.petition-btns{display:flex;flex-direction:column;gap:.75rem;max-width:300px}
.petition-label{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);margin-top:.5rem;text-align:center}

/* FOOTER */
footer{background:var(--blue-light);padding:4rem 5vw 0;padding-bottom:28vw;position:relative;overflow:hidden}
.footer-top-line{height:3px;background:var(--blue-mid);margin-bottom:3rem;border-radius:2px}
.footer-inner{display:grid;grid-template-columns:1.8fr 1fr 1fr;gap:3rem;margin-bottom:4rem;position:relative;z-index:1;align-items:start}
.footer-about p{font-size:.9rem;color:var(--grey-dark);line-height:1.8}
.footer-col-title{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--grey);margin-bottom:.6rem}
.footer-contact-info p{font-size:.82rem;color:var(--blue-dark);line-height:2;text-transform:uppercase;font-weight:600;letter-spacing:.02em}
.footer-contact-info a{color:var(--blue-dark);text-decoration:none}
.footer-social{display:flex;flex-direction:column;gap:.75rem}
.footer-social a{display:flex;align-items:center;gap:.6rem;font-size:.82rem;color:var(--blue-dark);text-decoration:none;font-weight:700;letter-spacing:.06em}
.footer-social a:hover{color:var(--blue-mid)}
.footer-bottom{border-top:1px solid var(--border);padding:1.25rem 0;font-size:.78rem;color:var(--grey);position:relative;z-index:1;margin-top:1rem}
.footer-vivo{position:absolute;bottom:0;left:0;right:0;pointer-events:none;z-index:0;line-height:0}
.footer-vivo svg{width:100%;height:auto;display:block;opacity:.5}

/* STICKY CTA */
.sticky-cta{display:none;position:fixed;bottom:0;left:0;right:0;z-index:50;padding:.75rem 1rem;background:rgba(255,255,255,.97);border-top:1px solid var(--border)}

/* ── 960px ── */
@media(max-width:960px){
  :root{--nav-h:58px}
  .nav-logo img{height:36px}
  /* Hero collapses to single column */
  .hero{grid-template-columns:1fr;padding-top:var(--nav-h)}
  .hero-left{order:1}
  .hero-image{position:relative;top:0;height:80vw;max-height:540px;order:0;background:var(--cream);overflow:hidden}
  .hero-img-desktop{display:none!important}
  .hero-img-mobile{display:block!important;width:100%;height:100%;object-fit:cover}
  .hero-intro{min-height:unset;padding:1.75rem 5vw 2.5rem;justify-content:flex-start}
  .hero-cta-btn{display:none}
  /* Stats on mobile: light blue bg, 2x2 grid, 4th stat shown */
  .stats{background:var(--blue-light);padding:2.5rem 5vw}
  .stats-grid{grid-template-columns:repeat(2,1fr);border-left:none}
  .stat-item{padding:1.25rem 1rem;border-right:1px solid rgba(0,0,0,.06);border-bottom:1px solid rgba(0,0,0,.06)}
  .stat-item:nth-child(even){border-right:none}
  .stat-item:nth-child(4){display:block}
  .stat-icon svg{width:26px;height:26px}
  .stats-headline{font-size:clamp(1.25rem,6vw,1.8rem)}
  /* Timeline on mobile: light blue bg */
  .timeline{background:var(--white);padding:2rem 0 3rem;display:flex;justify-content:center}
  .timeline-inner{width:90%}
  /* Testimonials */
  .testimonials{padding:2.5rem 0 2.5rem 5vw}
  .testimonials-title{padding-right:5vw}
  .test-card{flex:0 0 calc(50vw - 1rem);max-width:none}
  .test-carousel{gap:.5rem}
  .test-arrow{display:none}
  /* CTA mid */
  .cta-mid{padding:2rem 5vw}
  .cta-mid .btn-orange{width:100%;justify-content:space-between}
  /* Comparison */
  .comparison-grid{grid-template-columns:1fr;gap:1rem}
  .comparison{padding:2.5rem 5vw}
  .comparison-title{font-size:clamp(1.3rem,6vw,1.8rem);margin-bottom:1.5rem}
  .comp-col{padding:1.5rem 1.25rem}
  /* Ecosystem */
  .ecosystem{padding:2.5rem 5vw}
  .ecosystem-inner{grid-template-columns:1fr}
  .eco-circle{max-width:320px}
  .eco-bubble{width:64px;height:64px}
  .eco-bubble svg{width:28px;height:28px}
  /* Footer */

const LANGS = ['pt','en'];
let currentLang = 'pt';

function detectLang() {
  const nav = (navigator.language||'pt').slice(0,2).toLowerCase();
  return LANGS.includes(nav) ? nav : 'pt';
}

function applyLang(lang) {
  currentLang = lang;
  window.__lang = lang;
  document.documentElement.lang = lang;
  document.getElementById('lang-label').textContent = lang.toUpperCase();
  const t = T[lang]||T.pt;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    if (t[k] !== undefined) el.innerHTML = t[k];
  });
  renderStatsHeadline(t);
  renderCompTitle(t);
  renderEcoTitle(t);
  renderPetitionTitle(t);
  renderFooterAbout(t);
  renderTestimonials(lang, t);
}

function renderStatsHeadline(t) {
  const el = document.getElementById('stats-headline');
  if (el) el.innerHTML = t.stats_headline_pre + '<br>' + t.stats_headline_pre2 + ' <strong>' + t.stats_headline_strong + '</strong><br>' + t.stats_headline_post;
}
function renderCompTitle(t) {
  const el = document.getElementById('comp-title-el');
  if (el) el.innerHTML = t.comp_title_pre + ' <strong>' + t.comp_title_bold + '</strong>';
}
function renderEcoTitle(t) {
  const el = document.getElementById('eco-title-el');
  if (el) el.innerHTML = '<span class="eco-t1">'+t.eco_title_pre+'</span><br><span class="eco-t2">'+t.eco_title_mid+'</span><br><span class="eco-t3">'+t.eco_title_post+'</span>';
}
function renderPetitionTitle(t) {
  const el = document.getElementById('petition-title-el');
  if (el) el.innerHTML = t.petition_title_pre + '<strong>' + t.petition_title_bold + '</strong>' + (t.petition_title_post||'');
}
function renderFooterAbout(t) {
  const el = document.getElementById('footer-about-text');
  if (el) el.innerHTML = t.footer_about || '';
}

  carousel.innerHTML = TESTIMONIALS.map(p => `
    <div class="test-card">
      <div class="test-photo-frame">
        <svg class="test-frame-svg" viewBox="0 0 187 228" fill="none" preserveAspectRatio="none">

        ${p.photo ? `<img class="test-photo" src="${p.photo}" alt="${p.name}" loading="lazy">` : `<div class="test-photo-placeholder"></div>`}

      <div class="test-body">

      </div>
    </div>
  `).join('');

function scrollTest(dir) {
  const c = document.getElementById('test-carousel');
  if (c) c.scrollBy({left:dir*300,behavior:'smooth'});
}

function cycleLang() {
  const dd = document.getElementById('lang-dropdown');
  if (dd) dd.classList.toggle('open');
}
function selectLang(lang) {
  applyLang(lang);
  const dd = document.getElementById('lang-dropdown');
  if (dd) dd.classList.remove('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.nav-lang-wrap')) {
    const dd = document.getElementById('lang-dropdown');
    if (dd) dd.classList.remove('open');
  }
});
function openMenu() { document.getElementById('menu-overlay').classList.add('open'); document.body.style.overflow='hidden'; }
function closeMenu() { document.getElementById('menu-overlay').classList.remove('open'); document.body.style.overflow=''; }
