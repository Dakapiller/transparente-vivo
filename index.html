<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Transparente Vivo</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 334 334' fill='none'%3E%3Cpath d='M104 10C110 7.5 117 10 120 16L256 308C258 314 256 321 250 324C244 326 237 324 234 318L98 26C95.5 19.7 98 13 104 10ZM386 10C392 13 394 19.7 392 26L282 273C279 279 272 281 266 279C261 276 258 269 261 263L371 16C374 10 380 7.5 386 10Z' fill='%231636C9'/%3E%3Cpath d='M195 325C189 325 183 319 183 313V21C183 14 189 9 195 9C201 9 207 14 207 21V313C207 319 201 325 195 325Z' fill='%231636C9'/%3E%3C/svg%3E">
<meta name="description" content="Uma comunidade viva é património da cidade. Defenda o Edifício Transparente.">
<meta property="og:title" content="Transparente Vivo">
<meta property="og:description" content="Uma comunidade viva é património da cidade.">
<meta property="og:image" content="https://transparentevivo.pt/hero-desktop.jpg">
<style>
@font-face { font-family:'Outfit'; font-weight:300; font-style:normal; font-display:swap; src:url('fonts/Outfit-300.ttf') format('truetype'); }
@font-face { font-family:'Outfit'; font-weight:400; font-style:normal; font-display:swap; src:url('fonts/Outfit-400.ttf') format('truetype'); }
@font-face { font-family:'Outfit'; font-weight:500; font-style:normal; font-display:swap; src:url('fonts/Outfit-500.ttf') format('truetype'); }
@font-face { font-family:'Outfit'; font-weight:600; font-style:normal; font-display:swap; src:url('fonts/Outfit-600.ttf') format('truetype'); }
@font-face { font-family:'Outfit'; font-weight:700; font-style:normal; font-display:swap; src:url('fonts/Outfit-700.ttf') format('truetype'); }
</style>
<style>
/* ── Reset & Base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;font-weight:400;background:#fff;color:#1a1a2e;-webkit-font-smoothing:antialiased}

/* ── Design Tokens ── */
:root{
  --cream:#fffdf8;
  --orange:#ff4b00;
  --orange-light:#f9a07a;
  --blue-dark:#1636c8;
  --blue-mid:#0190fd;
  --blue-light:#e4f2ff;
  --blue-light2:#dbeeff;
  --grey:#8a8fa8;
  --grey-dark:#5a5f7a;
  --white:#ffffff;
  --border:#d0dff0;
  --radius:12px;
  --container:1200px;
  --nav-h:68px;
}

/* ── Typography ── */
h1,h2,h3{font-weight:700;line-height:1.1}
p{line-height:1.7}

/* ── Layout Helpers ── */
.container{max-width:var(--container);margin:0 auto;padding:0 5vw}
section{padding:5rem 5vw}

/* ── NAV ── */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav-h);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 5vw}
.nav-logo img{height:44px;width:auto;display:block}
.nav-right{display:flex;align-items:center;gap:1.5rem}
.nav-lang{display:flex;align-items:center;gap:4px;font-size:.9rem;font-weight:500;color:var(--blue-dark);cursor:pointer;background:none;border:none;font-family:'Outfit',sans-serif}
.nav-lang svg{transition:transform .2s}
.nav-hamburger{display:flex;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
.nav-hamburger span{display:block;width:24px;height:2px;background:var(--blue-dark);border-radius:2px;transition:all .3s}

/* ── MENU OVERLAY ── */
.menu-overlay{position:fixed;inset:0;z-index:200;background:var(--blue-light);display:none;flex-direction:column}
.menu-overlay.open{display:flex}
.menu-header{height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 5vw;border-bottom:1px solid var(--border)}
.menu-header .nav-logo img{height:44px;width:auto}
.menu-close{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:1rem}
.menu-close svg{width:24px;height:24px;stroke:var(--blue-dark);stroke-width:2;fill:none}
.menu-body{flex:1;padding:3rem 5vw;display:flex;flex-direction:column;justify-content:flex-start}
.menu-items{list-style:none;margin-bottom:3rem}
.menu-items li{border-bottom:2px dashed var(--blue-mid);padding:1.2rem 0}
.menu-items li:last-child{border-bottom:none}
.menu-items a{font-size:clamp(1.4rem,3vw,2rem);font-weight:700;color:var(--blue-dark);text-decoration:none;display:block}
.menu-cta{display:inline-flex;align-items:center;gap:1rem;background:var(--orange);color:#fff;font-size:1rem;font-weight:600;padding:.9rem 2rem;border-radius:50px;text-decoration:none;border:none;cursor:pointer;font-family:'Outfit',sans-serif;transition:background .2s}
.menu-cta:hover{background:#e04000}
.menu-cta svg{flex-shrink:0}
.menu-lang-row{margin-bottom:1.5rem;font-size:.9rem;color:var(--grey);display:flex;align-items:center;gap:.5rem}

/* ── HERO ── */
.hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;padding-top:var(--nav-h);background:var(--cream)}
.hero-text{display:flex;flex-direction:column;justify-content:center;padding:4rem 5vw 4rem 5vw}
.hero-title{font-size:clamp(2.8rem,5vw,5rem);line-height:1.05;margin-bottom:1.5rem;font-weight:700}
.hero-title .light{color:var(--orange-light);font-weight:700}
.hero-title .bold{color:var(--orange);font-weight:700}
.hero-sub{font-size:1rem;color:#3a3a4a;max-width:480px;margin-bottom:2.5rem;font-weight:400;line-height:1.75}
.hero-image{position:sticky;top:var(--nav-h);height:calc(100vh - var(--nav-h));overflow:hidden;background:#111}
.hero-image img{width:100%;height:100%;object-fit:cover;object-position:center center;display:block}
.hero-img-mobile{display:none}

/* ── ORANGE CTA BUTTON ── */
.btn-orange{display:inline-flex;align-items:center;gap:1rem;background:var(--orange);color:#fff;font-size:1rem;font-weight:600;padding:.9rem 2rem;border-radius:50px;text-decoration:none;border:none;cursor:pointer;font-family:'Outfit',sans-serif;transition:background .2s;white-space:nowrap}
.btn-orange:hover{background:#e04000}
.btn-orange svg{flex-shrink:0}
.btn-wa{display:inline-flex;align-items:center;gap:.75rem;background:none;color:var(--blue-dark);font-size:1rem;font-weight:500;padding:.85rem 1.5rem;border-radius:50px;text-decoration:none;border:2px solid var(--blue-dark);cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s}
.btn-wa:hover{background:var(--blue-dark);color:#fff}

/* ── STATS SECTION ── */
.stats{background:var(--blue-light);padding:4rem 5vw}
.stats-question{font-size:clamp(1.4rem,2.5vw,2rem);font-weight:700;color:var(--blue-dark);margin-bottom:3rem;max-width:600px}
.stats-question strong{color:var(--blue-mid)}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-left:1px solid var(--border)}
.stat-item{padding:1.5rem 2rem;border-right:1px solid var(--border)}
.stat-icon{margin-bottom:1rem;color:var(--blue-dark)}
.stat-icon svg{width:32px;height:32px;stroke:var(--blue-dark);stroke-width:1.5;fill:none}
.stat-num{font-size:clamp(1.8rem,3vw,2.8rem);font-weight:700;color:var(--blue-mid);line-height:1}
.stat-unit{font-size:clamp(1rem,1.5vw,1.3rem);font-weight:700;color:var(--blue-mid);display:block}
.stat-desc{font-size:.85rem;color:var(--grey);margin-top:.4rem;line-height:1.5}

/* ── TIMELINE ── */
.timeline{background:var(--white);padding:5rem 5vw}
.timeline-label{font-size:clamp(1.2rem,2vw,1.6rem);font-weight:400;color:var(--grey);margin-bottom:.5rem}
.timeline-label strong{color:var(--blue-dark)}
.timeline-track{position:relative;margin-top:3.5rem;padding-bottom:1rem}
.timeline-line{position:absolute;top:10px;left:0;right:0;height:3px;background:var(--blue-dark);z-index:0}
.timeline-line-orange{position:absolute;top:10px;right:0;width:20%;height:3px;background:var(--orange);z-index:1}
.timeline-items{display:grid;grid-template-columns:repeat(5,1fr);position:relative;z-index:2}
.timeline-item{padding-top:0}
.timeline-dot{width:22px;height:22px;border-radius:50%;background:var(--blue-dark);border:3px solid var(--white);outline:2px solid var(--blue-dark);margin-bottom:1rem}
.timeline-item:last-child .timeline-dot{background:var(--orange);outline-color:var(--orange)}
.timeline-year{font-size:.95rem;font-weight:700;color:var(--blue-dark);margin-bottom:.3rem}
.timeline-item:last-child .timeline-year{color:var(--orange)}
.timeline-desc{font-size:.82rem;color:var(--grey-dark);line-height:1.5;padding-right:1rem}

/* ── TESTIMONIALS ── */
.testimonials{background:var(--white);padding:4rem 5vw}
.testimonials-title{font-size:clamp(1.6rem,3vw,2.5rem);font-weight:700;color:var(--blue-dark);margin-bottom:2.5rem}
.testimonials-title .light{color:var(--blue-mid);font-weight:700}
.test-carousel-wrap{position:relative}
.test-carousel{display:flex;gap:1.5rem;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:1rem}
.test-carousel::-webkit-scrollbar{display:none}
.test-card{flex:0 0 280px;scroll-snap-align:start;border:2px solid var(--blue-light2);border-radius:var(--radius);overflow:hidden;background:#fff;box-shadow:0 2px 12px rgba(0,100,200,.06);padding:8px}
.test-photo{width:100%;aspect-ratio:3/2.5;object-fit:cover;object-position:top center;background:var(--blue-light);display:block;border-radius:8px;border:2px solid var(--blue-light2)}
.test-photo-placeholder{width:100%;aspect-ratio:3/2.5;background:var(--blue-light);display:flex;align-items:center;justify-content:center;border-radius:8px;border:2px solid var(--blue-light2)}
.test-body{padding:.9rem .3rem .3rem}
.test-quote{font-size:.9rem;color:var(--blue-mid);font-weight:600;line-height:1.5;margin-bottom:.75rem}
.test-since{font-size:.65rem;color:var(--grey);text-transform:uppercase;letter-spacing:.06em}
.test-name{font-size:.95rem;font-weight:700;color:var(--blue-dark);clear:both}
.test-role{font-size:.7rem;color:var(--grey);text-transform:uppercase;letter-spacing:.06em;display:flex;justify-content:space-between;align-items:center;margin-top:.25rem}
.test-nav{display:flex;gap:.75rem;margin-top:1.5rem;padding-left:5vw}
.test-nav button{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--blue-dark);transition:all .2s}
.test-nav button:hover{background:var(--blue-dark);color:#fff;border-color:var(--blue-dark)}

/* ── CTA MID ── */
.cta-mid{padding:3rem 5vw;display:flex;align-items:center;gap:2rem;flex-wrap:wrap}
.cta-mid-label{font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);margin-top:.75rem}

/* ── ECOSYSTEM ── */
.ecosystem{background:var(--blue-light);padding:5rem 5vw}
.ecosystem-inner{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:center}
.ecosystem-left .eco-label{font-size:.85rem;color:var(--grey);font-weight:500;margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.05em}
.ecosystem-title{font-size:clamp(1.4rem,2.5vw,2rem);font-weight:400;color:var(--grey);line-height:1.25;margin-bottom:1rem}
.ecosystem-title strong{font-weight:700;color:var(--blue-dark)}
.ecosystem-sub{font-size:.95rem;color:var(--blue-mid);line-height:1.7;max-width:400px;border-left:4px solid var(--blue-mid);padding-left:1rem;font-weight:500}
.eco-circle{position:relative;width:320px;height:320px;flex-shrink:0}
.eco-arcs{position:absolute;inset:0;width:100%;height:100%;z-index:0;overflow:visible}
.eco-node{position:absolute;display:flex;flex-direction:column;align-items:center;gap:.4rem;z-index:1}
.eco-top{top:0;left:50%;transform:translateX(-50%)}
.eco-right{right:0;top:50%;transform:translateY(-50%)}
.eco-bottom{bottom:0;left:50%;transform:translateX(-50%)}
.eco-left{left:0;top:50%;transform:translateY(-50%)}
.eco-bubble{width:80px;height:80px;border-radius:50%;border:1.5px solid var(--blue-light2);background:#fff;display:flex;align-items:center;justify-content:center}
.eco-bubble svg{width:36px;height:36px}
.eco-label-txt{font-size:.78rem;font-weight:600;color:var(--blue-mid);text-align:center;white-space:nowrap}
.eco-icon-item{display:flex;flex-direction:column;align-items:center;gap:.5rem;text-align:center}
.eco-icon-item svg{width:44px;height:44px;stroke:var(--blue-dark);stroke-width:1.5;fill:none}
.eco-icon-item span{font-size:.8rem;color:var(--grey-dark);font-weight:500}

/* ── COMPARISON ── */
.comparison{background:var(--white);padding:5rem 5vw}
.comparison-label{font-size:.85rem;color:var(--grey);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem}
.comparison-title{font-size:clamp(1.6rem,3vw,2.5rem);font-weight:700;color:var(--blue-mid);margin-bottom:3rem}
.comparison-title em{font-style:normal;color:var(--blue-dark);font-weight:700}
.comparison-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.comp-col{border:2px solid var(--border);border-radius:var(--radius);padding:2rem;background:var(--white)}
.comp-col.active{border-color:var(--blue-mid);background:#f5faff}
.comp-col-title{font-size:1.1rem;font-weight:700;color:var(--blue-dark);margin-bottom:1.5rem}
.comp-col.inactive .comp-col-title{color:var(--grey-dark)}
.comp-item{display:flex;gap:.75rem;align-items:flex-start;padding:.75rem 0;border-bottom:2px dashed var(--border)}
.comp-item:last-child{border-bottom:none}
.comp-check{width:20px;height:20px;flex-shrink:0;margin-top:2px}
.comp-check.yes{color:var(--blue-mid)}
.comp-check.no{color:var(--grey)}
.comp-item-text{font-size:.9rem;color:var(--grey-dark);line-height:1.5}
.comp-col.active .comp-item-text{color:var(--blue-dark)}

/* ── GALLERY ── */
.gallery{background:var(--white);padding:4rem 5vw}
.gallery-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;margin-top:2rem}
.gallery-grid img,.gallery-placeholder{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:8px;background:var(--blue-light);display:block;min-height:0}

/* ── PETITION ── */
.petition{background:var(--blue-light);padding:5rem 5vw 8rem}
.petition-inner{max-width:600px}
.petition-title{font-size:clamp(1.8rem,3.5vw,3rem);font-weight:700;color:var(--blue-dark);line-height:1.1;margin-bottom:1.5rem}
.petition-title em{font-style:normal;color:var(--orange)}
.petition-body{font-size:1rem;color:var(--grey-dark);margin-bottom:2rem;line-height:1.75}
.petition-btns{display:flex;flex-direction:column;gap:1rem;max-width:340px}

/* ── FOOTER ── */
footer{background:var(--blue-light);padding:4rem 5vw 2rem;position:relative;overflow:hidden}
.footer-inner{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3rem;margin-bottom:3rem;position:relative;z-index:1}
.footer-about p{font-size:.88rem;color:var(--grey-dark);line-height:1.7;margin-top:.75rem}
.footer-col-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--grey);margin-bottom:.75rem}
.footer-contact p{font-size:.8rem;color:var(--blue-dark);line-height:2;text-transform:uppercase;font-weight:500;letter-spacing:.03em}
.footer-contact a{color:var(--blue-dark);text-decoration:none;font-weight:600}
.footer-social{display:flex;flex-direction:column;gap:.75rem}
.footer-social a{display:flex;align-items:center;gap:.6rem;font-size:.82rem;color:var(--blue-dark);text-decoration:none;font-weight:700;letter-spacing:.06em}
.footer-social a:hover{color:var(--blue-mid)}
.footer-bottom{border-top:1px solid var(--border);padding-top:1.5rem;font-size:.8rem;color:var(--grey);position:relative;z-index:1}
.footer-vivo{position:absolute;bottom:-20px;left:0;right:0;opacity:.4;pointer-events:none;z-index:0;overflow:hidden}
.footer-vivo svg{width:100%;height:auto;max-height:180px}

/* ── STICKY MOBILE CTA ── */
.sticky-cta{display:none;position:fixed;bottom:0;left:0;right:0;z-index:50;padding:1rem;background:linear-gradient(to top,rgba(255,255,255,.97) 70%,transparent)}

/* ── MEDIA: 960px ── */
@media(max-width:960px){
  section{padding:4rem 4vw}
  .hero{grid-template-columns:1fr;min-height:unset;padding-top:var(--nav-h)}
  .hero-image{position:relative;top:0;height:auto;order:-1;background:var(--cream);padding:0}
  .hero-img-desktop{display:none!important}
  .hero-img-mobile{display:block!important;width:100%;height:auto;object-fit:cover;border-radius:0}
  .hero-text{padding:2rem 5vw 2.5rem}
  .stats-grid{grid-template-columns:repeat(2,1fr);border-top:1px solid var(--border)}
  .timeline-items{grid-template-columns:1fr;gap:0}
  .timeline-track{padding-bottom:0}
  .timeline-line,.timeline-line-orange{display:none}
  .timeline-item{display:flex;gap:1rem;align-items:flex-start;padding:.75rem 0;border-left:3px solid var(--blue-dark);padding-left:1.5rem;margin-left:9px;position:relative}
  .timeline-item:last-child{border-left-color:var(--orange)}
  .timeline-item.dashed{border-left:3px dashed var(--blue-dark)}
  .timeline-dot{position:absolute;left:-12px;top:16px;flex-shrink:0;margin-bottom:0;outline-offset:0}
  .timeline-content{flex:1}
  .test-card{flex:0 0 75vw;max-width:300px}
  .ecosystem-inner{grid-template-columns:1fr}
  .eco-circle{width:260px;height:260px}
  .eco-bubble{width:64px;height:64px}
  .eco-bubble svg{width:28px;height:28px}
  .comparison-grid{grid-template-columns:1fr}
  .footer-inner{grid-template-columns:1fr}
}

/* ── MEDIA: 600px ── */
@media(max-width:600px){
  :root{--nav-h:58px}
  .nav-logo img{height:34px}
  section{padding:3rem 5vw}
  .hero-image{height:auto;padding:0}
  .hero-title{font-size:clamp(2rem,9vw,3rem)}
  .stats{padding:3rem 5vw}
  .stats-grid{grid-template-columns:1fr 1fr;border-left:none}
  .stat-item{border:none;border-bottom:1px solid var(--border);padding:1.2rem}
  .timeline{padding:3rem 5vw}
  .test-card{flex:0 0 78vw;max-width:300px}
  .cta-mid{flex-direction:column;align-items:stretch}
  .cta-mid .btn-orange{width:100%;justify-content:space-between}
  .comparison-grid{gap:1rem}
  .petition-btns{max-width:100%}
  .footer-inner{gap:2rem}
  .sticky-cta{display:block}
  footer{padding-bottom:5rem}
}
</style>
</head>
<body>

<!-- NAV -->

const LANGS = ['pt','en','de','fr','it','es'];
let currentLang = 'pt';

function detectLang() {
  const nav = (navigator.language || navigator.userLanguage || 'pt').slice(0,2).toLowerCase();
  return LANGS.includes(nav) ? nav : 'pt';
}

function applyLang(lang) {
  currentLang = lang;
  window.__lang = lang;
  document.documentElement.lang = lang;
  document.getElementById('lang-label').textContent = lang.toUpperCase();
  const t = T[lang] || T.pt;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key] !== undefined) el.innerHTML = t[key];
  });
  // Update WhatsApp link
  const waBtn = document.getElementById('wa-btn');
  if (waBtn) {
    const msgs = {pt:'Assina+a+petição+para+salvar+o+Edifício+Transparente+do+Porto!',en:'Sign+the+petition+to+save+Edifício+Transparente+in+Porto!',de:'Unterzeichne+die+Petition+zur+Rettung+des+Edifício+Transparente!',fr:'Signez+la+pétition+pour+sauver+l\'Edifício+Transparente+à+Porto!',it:'Firma+la+petizione+per+salvare+l\'Edifício+Transparente+a+Porto!',es:'Firma+la+petición+para+salvar+el+Edifício+Transparente+en+Oporto!'};
    waBtn.href = `https://wa.me/?text=${msgs[lang]||msgs.pt}%20https%3A%2F%2Fpeticaopublica.com%2Fpsign.aspx%3Fpi%3DPT131237`;
  }
  renderTestimonials();
  renderStatsQuestion(t);
  renderEcoTitle(t);
}

function renderStatsQuestion(t) {
  const el = document.getElementById('stats-question');
  if (!el) return;
  const raw = t.stats_question || '';
  el.innerHTML = raw.replace(/<strong>(.*?)<\/strong>/g, '<strong style="color:var(--blue-mid)">$1</strong>');
  el.style.color = 'var(--blue-dark)';
}

function renderEcoTitle(t) {
  const el = document.getElementById('eco-title-el');
  if (!el) return;
  // Two-tone: "Um ecossistema" light/grey, "económico e social no Porto" dark bold
  const raw = t.eco_title || '';
  // Split at first space after "ecossistema" — words 1-2 light, rest bold dark
  // Pattern: first ~2 words normal weight grey, rest bold dark
  const words = raw.split(' ');
  const split = 2; // "Um ecossistema" = 2 words
  const light = words.slice(0, split).join(' ');
  const bold = words.slice(split).join(' ');
  el.innerHTML = `${light} <strong>${bold}</strong>`;
}

function cycleLang() {
  const idx = (LANGS.indexOf(currentLang) + 1) % LANGS.length;
  applyLang(LANGS[idx]);
}

function renderTestimonials() {
  const lang = currentLang;
  const carousel = document.getElementById('test-carousel');
  if (!carousel) return;
  const sinceLabel = {pt:'AQUI DESDE',en:'HERE SINCE',de:'HIER SEIT',fr:'ICI DEPUIS',it:'QUI DAL',es:'AQUÍ DESDE'}[lang]||'HERE SINCE';
  carousel.innerHTML = TESTIMONIALS.map(t => `
    <div class="test-card">
      ${t.photo ? `<img class="test-photo" src="${t.photo}" alt="${t.name}" loading="lazy">` : `<div class="test-photo-placeholder"></div>`}
      <div class="test-body">
        <p class="test-quote">${lang==='pt'?t.quote_pt:t.quote_en}</p>
        <p class="test-name">${t.name}</p>
        <p class="test-role"><span>${lang==='pt'?t.role_pt:t.role_en}</span><span class="test-since">${sinceLabel} ${t.since}</span></p>
      </div>
    </div>
  `).join('');
}

function scrollTest(dir) {
  const c = document.getElementById('test-carousel');
  if (c) c.scrollBy({left: dir * 300, behavior:'smooth'});
}

document.addEventListener('DOMContentLoaded', () => {
